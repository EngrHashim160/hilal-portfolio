<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="YouTube Automation Agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/>
      <stop offset="55%" stop-color="#0d1b34"/>
      <stop offset="100%" stop-color="#071a14"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="90%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#3b82f6" fill-opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>
  <rect x="2" y="2" width="1196" height="671" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- accent tag -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="80" y="80" width="179" height="40" rx="20" fill="#10b981" fill-opacity="0.14" stroke="#10b981" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="98" y="106" font-size="20" font-weight="600" fill="#5eead4" letter-spacing="0.5">Multi-Agent</text>

    <!-- title -->
    <text font-size="58" font-weight="800" fill="#f1f5f9" letter-spacing="-0.5"><tspan x="80" y="307.5">YouTube Automation</tspan><tspan x="80" y="377.5">Agents</tspan></text>

    <!-- tech stack -->
    <text x="80" y="605" font-size="24" font-weight="500" fill="#94a3b8" letter-spacing="0.3">OpenClaw · Insight · SEO · Thumbnail Agents</text>
  </g>
</svg>
